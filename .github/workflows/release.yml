name: Release

# Builds and publishes app binaries when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            wails-platform: darwin/arm64
          - os: macos-13
            platform: darwin-amd64
            wails-platform: darwin/amd64
          - os: windows-latest
            platform: windows-amd64
            wails-platform: windows/amd64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        shell: bash
        run: |
          wails build -platform ${{ matrix.wails-platform }} \
            -ldflags "-X main.version=${GITHUB_REF_NAME}"

      - name: Package (macOS)
        if: startsWith(matrix.platform, 'darwin')
        run: |
          cd build/bin
          ditto -c -k --keepParent "mochila-archive-viewer.app" \
            "mochila-archive-viewer-${GITHUB_REF_NAME}-${{ matrix.platform }}.zip"

      - name: Package (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/mochila-archive-viewer.exe `
            -DestinationPath "build/bin/mochila-archive-viewer-$env:GITHUB_REF_NAME-${{ matrix.platform }}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: src/build/bin/mochila-archive-viewer-*.zip
